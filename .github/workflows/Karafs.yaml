name: Selenium HTML Snapshots

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  selenium-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install selenium webdriver_manager
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver

    - name: Run Selenium and save HTML
      run: python Sib.py

    - name: Upload HTML snapshots
      uses: actions/upload-artifact@v3
      with:
        name: html-snapshots
        path: html_snapshots/
        retention-days: 7
